# Site configuration — Graham Stillward

site_name: Graham Stillward
site_url: https://graham-stillward.github.io/
site_description: Essays and commentary

theme:
  name: material
  logo: assets/lapillus-mark.svg
  favicon: assets/lapillus-favicon.svg
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: brown
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Merriweather
    code: Roboto Mono
  features:
    - navigation.footer
    - search.suggest
    - content.tooltips

plugins:
  - search
  - blog:
      # Makes the blog the site's front page
      blog_dir: .
      blog_toc: false
      post_readtime: true
      archive: true
      categories: true

nav:
  - Writings: index.md
  - About: about.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - smarty
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
